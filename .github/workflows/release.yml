name: Build Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: python -m pip install --upgrade pip build pytest
      - run: python -m pytest
      - run: python -m build
      - name: Build VSIX
        working-directory: vscode-extension
        run: |
          npm install
          npx --yes @vscode/vsce package
      - name: Checksums
        run: |
          find dist vscode-extension -maxdepth 1 -type f \( -name '*.whl' -o -name '*.tar.gz' -o -name '*.vsix' \) -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            vscode-extension/*.vsix
            SHA256SUMS.txt
